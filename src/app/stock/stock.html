<h2>Stock</h2>

<div>
  <input type="text" [(ngModel)]="filterTick" placeholder="Enter stock tick">
  <button (click)="filterStock()">Filter</button>
</div>

<p>Number of stocks: {{ stocks.length }}</p>

<table>
  <thead>
    <tr>
      <th>Tick</th>
      <th>Company</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let stock of stocks">
      <td>{{ stock.tick }}</td>
      <td>{{ stock.company }}</td>
    </tr>
  </tbody>
</table>
